name: 'Setup JDK + Gradle'
description: 'Common bootstrap: Temurin JDK + Gradle wrapper.'
inputs:
  cache-read-only:
    description: >
      Pass 'true' in publish/release jobs to prevent Gradle cache
      writes — avoids cache poisoning from untrusted PR runs.
    default: 'false'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-java@v5.4.0
      with:
        distribution: temurin
        java-version: '21'
    - uses: gradle/actions/setup-gradle@v6.2.0
      with:
        cache-read-only: ${{ inputs.cache-read-only }}
