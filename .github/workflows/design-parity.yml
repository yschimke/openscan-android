name: Design parity artifacts

# Regenerate the design-parity artifacts (candidate bundle + report.html
# triptychs + verdict) on every push to main and publish them to the long-lived
# `design-parity/main` branch, force-updated each run so it always reflects the
# current state of main. Interim, hand-rolled version of the permanent-artifact-
# branch pattern the design-parity Action should own (design-parity#56); mirrors
# compose-ai-tools' `apply` baseline mechanism.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the regenerated artifacts to design-parity/main

concurrency:
  # Serialize on the artifact branch; the newest main commit wins.
  group: design-parity-artifacts
  cancel-in-progress: true

jobs:
  artifacts:
    name: Render + publish design-parity artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0

      # JDK + Gradle. The Android SDK is preinstalled on ubuntu-latest (the
      # :openscan-components module still has an android target to configure);
      # the candidate itself renders on the CMP desktop (Skiko) backend.
      - uses: ./.github/actions/setup

      - name: Install compose-preview CLI
        uses: yschimke/compose-ai-tools/.github/actions/install@v0.16.39
        with:
          version: "0.16.0"

      - name: Render candidate bundle (CMP desktop)
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          set -euo pipefail
          mkdir -p build/design-parity
          # Drive the render from design-map.json so this never drifts from it.
          mapfile -t IDS < <(jq -r '.components[].previewId' design-map.json)
          args=()
          for id in "${IDS[@]}"; do args+=(--id "$id"); done
          compose-preview bundle pack --module openscan-components "${args[@]}" \
            --with-semantics \
            -o build/design-parity/candidates.bundle.png --timeout 600

      - name: Render reference images from HTML
        run: |
          set -euo pipefail
          for ref in $(jq -r '.components[].ref' design-map.json); do
            png="${ref%.html}.png"
            google-chrome-stable --headless=new --no-sandbox --disable-gpu \
              --hide-scrollbars --force-device-scale-factor=2.625 \
              --window-size=411,914 --screenshot="$png" "file://$PWD/$ref"
          done

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0

      - name: Run design-parity
        run: |
          set -euo pipefail
          components="$(jq -r '[.components[].code] | join(",")' design-map.json)"
          npx -y design-parity@0.1.26 run \
            --repo . \
            --components "$components" \
            --candidate-bundles build/design-parity/candidates.bundle.png \
            --out build/design-parity/out \
            --repo-slug "${GITHUB_REPOSITORY}" \
            --branch design-parity/main \
            --source-commit "${GITHUB_SHA}"

      - name: Publish artifacts to design-parity/main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          art="$(mktemp -d)"
          cp -a build/design-parity/out/. "$art/"
          cp build/design-parity/candidates.bundle.png "$art/" || true
          printf '%s\n' "$GITHUB_SHA" > "$art/SOURCE_COMMIT"
          cd "$art"
          git init -q
          git checkout -q -b design-parity/main
          git add -A
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -q -m "design-parity artifacts for ${GITHUB_SHA}"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            design-parity/main
