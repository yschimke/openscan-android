<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=411, initial-scale=1" />
    <title>Scanner detail — light</title>
    <style>
      :root {
        --surface: #fbf8ff;
        --on-surface: #1b1b1f;
        --on-surface-variant: #46464f;
        --primary: #4355b9;
        --on-primary: #ffffff;
        --container: #efedf4;
        --container-highest: #e3e1e9;
        --secondary-container: #dfe1f9;
        --on-secondary-container: #171a2c;
        --outline: #767680;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 411px; background: var(--surface); color: var(--on-surface);
        font-family: "Roboto", "Segoe UI", system-ui, sans-serif; }
      .appbar { height: 64px; display: flex; align-items: center; gap: 16px; padding: 0 16px;
        font-size: 22px; font-weight: 500; }
      .content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
      .head { font-size: 24px; font-weight: 600; }
      .sub { font-size: 12px; color: var(--on-surface-variant); display: flex; gap: 12px;
        align-items: center; margin-top: 2px; }
      .pill { display: flex; align-items: center; gap: 4px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
      .card { border-radius: 12px; padding: 16px; background: var(--container);
        display: flex; flex-direction: column; gap: 12px; }
      .section { color: var(--primary); font-size: 14px; font-weight: 600; }
      .preview { width: 100%; aspect-ratio: 4/3; background: var(--container-highest);
        border-radius: 12px; display: flex; align-items: center; justify-content: center;
        color: var(--on-surface-variant); font-size: 14px; }
      .row { display: flex; align-items: center; gap: 8px; }
      .tonal { background: var(--secondary-container); color: var(--on-secondary-container);
        border-radius: 20px; padding: 8px 16px; font-size: 14px; }
      .stepper { display: flex; justify-content: space-between; align-items: center; }
      .stepval { font-size: 16px; font-weight: 600; min-width: 32px; text-align: center; }
      .filled { background: var(--primary); color: var(--on-primary); border-radius: 20px;
        padding: 12px; text-align: center; font-weight: 500; }
      .btn { border: 1px solid var(--outline); border-radius: 20px; padding: 10px;
        text-align: center; color: var(--primary); font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="appbar"><span>&#8592;</span>Workshop OpenScan</div>
    <div class="content">
      <div>
        <div class="head">Workshop OpenScan</div>
        <div class="sub"><span class="pill"><span class="dot"></span>Online</span><span>openscan.local · fw 3.1.0</span></div>
      </div>
      <div class="card">
        <div class="section">Camera</div>
        <div class="preview">No preview</div>
        <div class="row"><span style="font-size:14px;font-weight:500">Turntable</span>
          <span class="tonal">&#8722;15&deg;</span><span class="tonal">+15&deg;</span></div>
      </div>
      <div class="card">
        <div class="section">Scan</div>
        <div class="stepper"><span style="font-size:16px">Points</span>
          <span class="row"><span>&#8722;</span><span class="stepval">40</span><span>+</span></span></div>
        <div class="stepper"><span style="font-size:16px">Rotations</span>
          <span class="row"><span>&#8722;</span><span class="stepval">2</span><span>+</span></span></div>
        <div class="filled">Start scan</div>
      </div>
      <div class="btn">Open full web interface</div>
    </div>
  </body>
</html>
